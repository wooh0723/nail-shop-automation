name: Fetch Notion & Deploy

on:
  schedule:
    # 매일 KST 06:00 (UTC 21:00)
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lookbook

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lookbook/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fetch from Notion
        run: npm run fetch
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Commit fetched data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/data/ public/images/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync notion data [skip ci]"
          git push

      - name: Deploy to Vercel
        working-directory: .
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
